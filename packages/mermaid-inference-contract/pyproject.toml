[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mermaid-inference-contract"
version = "0.3.0"
description = "Pure-pydantic request/response contract between the MERMAID API and ML inference"
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE" }
dependencies = ["pydantic>=2"]

[dependency-groups]
dev = ["pytest>=8", "ruff>=0.6"]

[tool.hatch.build.targets.wheel]
packages = ["src/mermaid_inference_contract"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
